name: Keep Alive — Prevent Sleep

# Ping the app every 20 minutes to prevent free-tier sleep
# Works for: HuggingFace Spaces, Render, Railway free tiers

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes, 24/7
  workflow_dispatch:           # manual trigger

jobs:
  ping:
    name: Ping App
    runs-on: ubuntu-latest
    # Only run if APP_URL secret is set
    if: ${{ secrets.APP_URL != '' }}

    steps:
      - name: Ping health endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}   # e.g. https://username-space.hf.space
        run: |
          echo "Pinging: ${APP_URL}/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${APP_URL}/health")
          echo "HTTP Status: ${STATUS}"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
            echo "✅ App is alive (status: ${STATUS})"
          else
            echo "⚠️ Unexpected status: ${STATUS} — app may be down"
            exit 1
          fi
