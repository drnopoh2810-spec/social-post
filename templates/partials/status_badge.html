{% if p.status == 'NEW' %}<span class="badge badge-blue">🆕 جديد</span>
{% elif p.status == 'POSTED' %}<span class="badge badge-green">✅ منشور</span>
{% elif p.status == 'SKIP' %}<span class="badge badge-orange">⏭️ متخطى</span>
{% elif p.status == 'ERROR' %}<span class="badge badge-red">❌ خطأ</span>
{% else %}<span class="badge">{{ p.status }}</span>{% endif %}
