name: CI — Test & Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile app.py wsgi.py run.py config.py
          python -m py_compile database/models.py
          python -m py_compile routes/auth.py routes/api.py routes/dashboard.py routes/workflow.py
          python -m py_compile services/ai_service.py services/image_service.py
          python -m py_compile services/key_rotator.py services/social_service.py
          python -m py_compile services/telegram_bot.py services/workflow_service.py
          echo "✅ All files pass syntax check"

      - name: Verify app loads
        env:
          SECRET_KEY: test-secret-key-for-ci
          FLASK_ENV: development
          DATABASE_URL: sqlite:///test_ci.db
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123
        run: |
          python -c "
          from app import create_app
          app = create_app('development')
          print('✅ App factory OK')
          with app.app_context():
              from database.models import db
              db.create_all()
              print('✅ DB schema OK')
          with app.test_client() as c:
              r = c.get('/health')
              assert r.status_code == 200, f'Health check failed: {r.status_code}'
              print('✅ /health endpoint OK')
          "

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t social-post:ci .

      - name: Test container starts
        run: |
          docker run -d \
            --name test-container \
            -e SECRET_KEY=ci-test-secret \
            -e FLASK_ENV=production \
            -e DATABASE_URL=sqlite:////app/data/social_post.db \
            -e ADMIN_USERNAME=admin \
            -e ADMIN_PASSWORD=admin123 \
            -p 7860:7860 \
            social-post:ci
          echo "Waiting for app to start..."
          sleep 20
          docker logs test-container
          curl -sf http://localhost:7860/health && echo "✅ Health check passed" || \
            (echo "❌ Health check failed"; docker logs test-container; exit 1)
          docker stop test-container && docker rm test-container
