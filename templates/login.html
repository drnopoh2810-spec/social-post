<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — بوست سوشال</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#0a0b0f;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrap{width:420px;max-width:90vw}
.login-logo{text-align:center;margin-bottom:32px}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#6c63ff,#ec4899);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px}
.logo-title{font-size:24px;font-weight:900;color:#a78bfa}
.logo-sub{font-size:13px;color:#64748b;margin-top:4px}
.login-card{background:#1a1b24;border:1px solid #2a2b3a;border-radius:16px;padding:32px}
.login-title{font-size:20px;font-weight:700;margin-bottom:24px;text-align:center}
.form-group{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:7px}
input{width:100%;background:#181920;border:1px solid #2a2b3a;border-radius:8px;padding:12px 16px;color:#e2e8f0;font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(108,99,255,.15)}
.btn-login{width:100%;background:linear-gradient(135deg,#6c63ff,#a78bfa);color:white;border:none;border-radius:8px;padding:13px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(108,99,255,.3)}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ef4444;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">🧠</div>
    <div class="logo-title">بوست سوشال</div>
    <div class="logo-sub">نظام النشر الذكي على السوشال ميديا</div>
  </div>
  <div class="login-card">
    <div class="login-title">🔐 تسجيل الدخول</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="error-msg">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" name="username" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">دخول ←</button>
    </form>
  </div>
</div>
</body>
</html>
