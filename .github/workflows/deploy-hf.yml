name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_SPACE}" ]; then
            echo "⚠️ HF_TOKEN or HF_SPACE not set — skipping"
            exit 0
          fi

          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Debug: show where we are and what files exist
          echo "Working dir: $(pwd)"
          echo "Files: $(ls -la)"

          # Clone HF Space outside the repo
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE} /tmp/hf_space

          # Copy current directory contents → HF Space
          # $(pwd)/ with trailing slash = copy contents only
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.sqlite' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            "$(pwd)/" /tmp/hf_space/

          cd /tmp/hf_space
          git add -A
          git diff --staged --quiet && echo "Nothing to deploy" && exit 0
          git commit -m "Deploy: $(git -C $GITHUB_WORKSPACE rev-parse --short HEAD)"
          git push
          echo "✅ Deployed to: ${HF_SPACE}"
