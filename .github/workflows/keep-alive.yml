name: Keep Alive — Prevent Sleep

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping App
    runs-on: ubuntu-latest

    steps:
      - name: Ping health endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "${APP_URL}" ]; then
            echo "⚠️ APP_URL not set — skipping ping"
            echo "Add it in: GitHub repo → Settings → Secrets → Actions"
            exit 0
          fi

          echo "Pinging: ${APP_URL}/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${APP_URL}/health")
          echo "HTTP Status: ${STATUS}"

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
            echo "✅ App is alive (status: ${STATUS})"
          else
            echo "⚠️ Unexpected status: ${STATUS}"
            exit 1
          fi
