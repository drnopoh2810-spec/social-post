name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install git-lfs
        run: git lfs install

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          # Skip if secrets not configured
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_SPACE}" ]; then
            echo "⚠️ HF_TOKEN or HF_SPACE not set — skipping deploy"
            echo "Add them in: GitHub repo → Settings → Secrets → Actions"
            exit 0
          fi

          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE} hf_space

          rsync -av --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.sqlite' \
            --exclude='__pycache__' \
            --exclude='.github' \
            . hf_space/

          cd hf_space
          git add -A
          git diff --staged --quiet || git commit -m "Deploy: $(git -C .. rev-parse --short HEAD)"
          git push
          echo "✅ Deployed to HuggingFace Space: ${HF_SPACE}"
